# Context Manifest — Strudel Modality

# Controls which context sources are loaded and injected into LLM prompts
# for the Strudel music composition modality.

sources:

# ── Tutorials ──

- id: language_reference
  enabled: true
  category: tutorial
  path: tutorials/language_reference.md
  description: "Core Strudel functions, methods, synths, and signals"
  inject_into: [ system ]

- id: mini_notation
  enabled: true
  category: tutorial
  path: tutorials/mini_notation.md
  description: "Mini-notation syntax for writing patterns"
  inject_into: [ system ]

- id: audio_effects
  enabled: true
  category: tutorial
  path: tutorials/audio_effects.md
  description: "Audio effects: filters, reverb, delay, distortion, etc."
  inject_into: [ system ]

- id: pattern_effects
  enabled: true
  category: tutorial
  path: tutorials/pattern_effects.md
  description: "Pattern-level effects: jux, off, ply, euclidean, arrangement"
  inject_into: [ system ]

- id: composition_tips
  enabled: true
  category: tutorial
  path: tutorials/composition_tips.md
  description: "Tips and tricks for composing full multi-part songs"
  inject_into: [ system ]

# ── Examples ──

- id: community_examples
  enabled: true
  category: examples
  path: examples/community_examples.md
  description: "Curated community compositions showing diverse styles and full arrangements"
  inject_into: [ system ]

- id: simple_patterns
  enabled: true
  category: examples
  path: examples/simple_patterns.md
  description: "Short atomic patterns ideal for seed generation"
  inject_into: [ system ]
