version: 2
modality: strudel
default_profile: intermediate

profiles:
  simple:
    description: "Essential Strudel craft: cycles, mini-notation, rhythmic roles, scales, motifs, basic harmony, and basic sound shaping."
    includes:
    - runtime_contract
    - simple_cycles_parts
    - simple_pitch_harmony_sound
    - evolution_playbook

  intermediate:
    description: "Adds groove design, arrangement, voice-leading, modulation, sampling, effects architecture, and richer timbral motion."
    extends: simple
    includes:
    - intermediate_groove_arrangement
    - intermediate_sampling_effects

  advanced:
    description: "Adds advanced pattern architecture, stepwise/polymetric design, deep harmony, advanced synthesis, sample transformation, xenharmony, and experimental form."
    extends: intermediate
    includes:
    - advanced_pattern_architecture
    - advanced_harmony_timbre

sources:
- id: runtime_contract
  enabled: true
  level: shared
  category: tutorial
  path: shared/00_runtime_contract.md
  inject_into: [ system ]
  description: "Runtime rules, visualization conventions, allowed sound sources, harmonic coherence, and orbit/effect cautions."

- id: simple_cycles_parts
  enabled: true
  level: simple
  category: tutorial
  path: simple/10_cycles_mini_notation_and_parts.md
  inject_into: [ system ]
  description: "Cycles, implied meter, subdivision, mini-notation, rhythmic roles, density control, and reusable part fragments."

- id: simple_pitch_harmony_sound
  enabled: true
  level: simple
  category: tutorial
  path: simple/11_pitch_rhythm_harmony_and_basic_sound.md
  inject_into: [ system ]
  description: "Pitch representations, motifs, scales, chord progressions, cadential motion, register, waveforms, envelopes, and basic mix choices."

- id: intermediate_groove_arrangement
  enabled: true
  level: intermediate
  category: tutorial
  path: intermediate/20_groove_arrangement_and_melodic_development.md
  inject_into: [ system ]
  description: "Syncopation, swing, fills, section design, mask/struct/arrange logic, melody development, voice-leading, and role interaction."

- id: intermediate_sampling_effects
  enabled: true
  level: intermediate
  category: tutorial
  path: intermediate/21_synthesis_sampling_effects_and_motion.md
  inject_into: [ system ]
  description: "Sample and synth sources, variants, chopping, signals, automation, filter/pitch motion, orbits, ducking, and timbral choreography."

- id: advanced_pattern_architecture
  enabled: true
  level: advanced
  category: tutorial
  path: advanced/30_pattern_architecture_polymeter_and_form.md
  inject_into: [ system ]
  description: "Function-first pattern design, polymeter, stepwise tools, phasing, accumulation, conditional transforms, and large-scale formal planning."

- id: advanced_harmony_timbre
  enabled: true
  level: advanced
  category: tutorial
  path: advanced/31_advanced_harmony_timbre_and_experimental_worlds.md
  inject_into: [ system ]
  description: "Extended harmony, dictionaries, advanced voicing control, FM, partials, phases, envelopes, wavetable/sample repurposing, xenharmony, and experimental worlds."

- id: evolution_playbook
  enabled: true
  level: shared
  category: strategy
  path: strategies/90_strudel_evolution_playbook.md
  inject_into: [ system ]
  description: "Mutation and crossover operators, phenotype preservation, structural edits, novelty injection, and one-shot breeding strategy."

prompt_bundle:
  path: prompts/prompt_bundle.yaml
